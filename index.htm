<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab: Semester 2</title>
    <style>
        /* CSS Variables for easy theme switching */
        :root {
            --primary: #4255ff;
            --bg: #f6f7fb;
            --white: #ffffff;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-secondary: #666666;
            --success: #2ecc71;
            --border: #eeeeee;
        }

        /* Dark Mode overrides */
        [data-theme="dark"] {
            --bg: #121212;
            --white: #1e1e1e;
            --card-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-secondary: #aaaaaa;
            --border: #333333;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            color: var(--text-main);
            transition: background 0.3s ease;
        }

        .container { max-width: 650px; width: 100%; text-align: center; position: relative; }
        
        /* Dark Mode Toggle Button */
        .theme-toggle {
            position: absolute;
            top: -10px;
            right: 0;
            background: none;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .menu-card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .week-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin: 20px 0; }
        .week-btn { padding: 10px; border: 1px solid var(--border); background: var(--white); color: var(--text-main); border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .week-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }
        
        .card-container { perspective: 1000px; width: 100%; height: 350px; margin: 20px 0; cursor: pointer; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .no-animation { transition: none !important; }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 1.8rem; border-radius: 20px; padding: 30px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.2); background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); }
        .card-back { transform: rotateY(180deg); color: var(--text-secondary); font-size: 1.3rem; line-height: 1.4; }
        
        .hint { color: var(--text-secondary); font-size: 0.85rem; margin-top: 15px; }
        .hidden { display: none; }
        button.main-btn { padding: 12px 30px; background: var(--primary); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 1rem; margin: 5px; }
    </style>
</head>
<body data-theme="light">

<div class="container">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 Dark Mode</button>
    <h1> Semester Two Vocab (JG)</h1>

    <div id="setup-ui" class="menu-card">
        <h3>Select Weeks to Study</h3>
        <div class="week-grid" id="week-selector"></div>
        <button class="main-btn" onclick="startStudy()">Start Session</button>
    </div>

    <div id="study-ui" class="hidden">
        <div style="margin-bottom:10px;">Week <span id="week-num">-</span> | Card <span id="current-idx">1</span>/<span id="total-idx">0</span></div>
        <div class="card-container" onclick="flipCard()">
            <div class="card" id="card-inner">
                <div class="card-face" id="front-text">Word</div>
                <div class="card-face card-back" id="back-text">Definition</div>
            </div>
        </div>
        <div class="hint">[Space] Flip | [←] Unknown | [→] Known</div>
    </div>

    <div id="result-ui" class="hidden menu-card">
        <h2>Session Complete!</h2>
        <p id="result-summary"></p>
        <button class="main-btn" onclick="location.reload()">Back to Menu</button>
        <button class="main-btn" id="retry-unknown-btn" style="background:var(--success)" onclick="restartUnknown()">Study Unknown Only</button>
    </div>
</div>

<script>
    // --- Theme Logic ---
    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        document.getElementById('theme-btn').innerText = next === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
        localStorage.setItem('vocab_theme', next);
    }

    // Load saved theme on startup
    const savedTheme = localStorage.getItem('vocab_theme');
    if (savedTheme) {
        document.body.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-btn').innerText = savedTheme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode';
    }

    // --- Vocabulary Data ---
    const rawData = {
        1: ["Loquacious (adj) talkative, garrulous", "Ludicrous (adj) laughable, ridiculous", "Martinet (n) strict disciplinarian", "Maudlin (adj) overly or tearfully sentimental", "Nebulous (adj) vague, hazy"],
        2: ["Obsequious (adj) excessively eager to please or obey, fawning", "Ostracize (v) banned from social and political favor", "Panacea (n) cure-all", "Pander (v) to indulge somebody's weaknesses", "Placate (v) appease, pacify"],
        3: ["Prodigious (adj) huge, monstrous, mighty", "Prolific (adj) inventive, fertile, productive", "Propensity (n) leaning, bent, natural inclination", "Prudent (adj) wisely cautious", "Redundant (adj) overly wordy, repetitive"],
        4: ["Surreptitious (adj) corrupt, without proper authority, by sly, clandestine", "Taciturn (adj) reserved, habitually silent", "Truculent (adj) fierce, savage, cruel", "Vacillate (v) hesitate, waver, change", "Vilify (v) slandered, maligned"],
        5: ["Vituperation (n) verbal abuse", "Abhor (v) hates, loathes, detests", "Abstraction (n) a deduction, an idea separate from specific objects", "Acme (n) top, highest point of perfection", "Affluence (n) riches, abundance, opulence"],
        6: ["Amnesty (n) a general pardon for offenses against the government, a grant of immunity", "Assuage (v) lessen, pacify, mitigate", "Bilious (adj) sour, bad tempered, crabby", "Blasé (adj) bored, uninterested, satiated", "Captious (adj) quibbling, sophistical, carping, overly critical"],
        7: ["Circumspect (adj) cautious, careful, unobjectionable", "Contraband (n) smuggled goods, prohibited goods", "Countenance (n) face, expression, features", "Deleterious (adj) bad, harmful, injurious", "Despot (n) bully, dictator, tyrant"],
        8: ["Dissident (adj) disagreeing, dissenting", "Effrontery (n) nerve, boldness, presumption", "Erudite (adj) well read, scholarly", "Expatiate (v) expand, enlarge", "Felicitous (adj) fitting, apt, appropriate"],
        9: ["Garrulous (adj) talkative, cattery, loquacious", "Gesticulate (v) making motions, making gestures", "Hue (n) shades, tints", "Impasse (n) standstill, deadlock, an insoluble difficulty", "Ineluctable (adj) certain, unavoidable, inevitable"],
        10: ["Intransigent (adj) stubborn, uncompromising, irreconcilable", "Ken (n) knowing, field of knowledge, cognizance", "Lucid (adj) clear, enlightening, comprehensible", "Malinger (v) shirking their work, evading duty, feigning incapacity", "Mnemonic (adj) memory improvement"],
        11: ["Myriad (adj) crowds of, very numerous, innumerable", "Narcissistic (adj) self-centered, self-adultery, egotistic", "Odious (adj) hateful, disgusting, offensive", "Palpitate (v) beat quickly, pound", "Paraphrase (n) restatement, a statement in other words"],
        12: ["Pedant (n) narrow-minded person, trivial person", "Peroration (n) conclusion, summary, recapitulation", "Platonic (adj) idealistic, spiritual, unsensual", "Pragmatic (adj) practical, businesslike, factual", "Promiscuous (adj) loose, sexually uncontrolled"],
        13: ["Recalcitrant (adj) resisting authority, uncooperative, refractory", "Restive (adj) nervous, uneasy, restless", "Sardonic (adj) sarcastic, biting, ironic", "Sensuous (adj) pleasurable, physical, sensory", "Stolid (adj) not easily excited, unemotional, impassive"],
        14: ["Sybarite (n) lover of luxury, voluptuary, pleasure seeker, glutton", "Tirade (n) antagonistic speech, rant, outburst, denunciation", "Vagary (n) whim, quirk, capriciousness", "Venal (adj) corrupt, purchasable, mercenary", "Vicarious (adj) second-hand, substitute, empathetic"],
        15: ["Vitiated (adj) weakened, spoiled, marred", "Abnegation (n) renouncing, giving up his rights", "Abstruse (adj) difficult, deep, recondite", "Acrid (adj) biting, sharp, caustic", "Affront (v) insulted, offended, was offensive when face to face with"]
    };

    let selectedWeeks = new Set();
    let studyQueue = [], unknownCards = [], currentIndex = 0;

    const selector = document.getElementById('week-selector');
    for(let i=1; i<=15; i++) {
        const btn = document.createElement('button');
        btn.className = 'week-btn';
        btn.innerText = `Wk ${i}`;
        btn.onclick = () => {
            btn.classList.toggle('selected');
            selectedWeeks.has(i) ? selectedWeeks.delete(i) : selectedWeeks.add(i);
        };
        selector.appendChild(btn);
    }

    function startStudy() {
        if(selectedWeeks.size === 0) return alert("Select at least one week!");
        studyQueue = [];
        selectedWeeks.forEach(wk => {
            rawData[wk].forEach(item => {
                const parts = item.split(' ');
                studyQueue.push({ word: parts[0], def: `${parts[1]} ${parts.slice(2).join(' ')}`, week: wk });
            });
        });
        studyQueue.sort(() => Math.random() - 0.5);
        initSession();
    }

    function initSession() {
        currentIndex = 0;
        unknownCards = [];
        document.getElementById('setup-ui').classList.add('hidden');
        document.getElementById('result-ui').classList.add('hidden');
        document.getElementById('study-ui').classList.remove('hidden');
        showCard();
    }

    function showCard() {
        if (currentIndex >= studyQueue.length) { showResults(); return; }
        const cardInner = document.getElementById('card-inner');
        cardInner.classList.add('no-animation');
        cardInner.classList.remove('is-flipped');
        
        const c = studyQueue[currentIndex];
        document.getElementById('front-text').innerText = c.word;
        document.getElementById('back-text').innerText = c.def;
        document.getElementById('week-num').innerText = c.week;
        document.getElementById('current-idx').innerText = currentIndex + 1;
        document.getElementById('total-idx').innerText = studyQueue.length;

        void cardInner.offsetWidth; 
        setTimeout(() => cardInner.classList.remove('no-animation'), 50);
    }

    function flipCard() { document.getElementById('card-inner').classList.toggle('is-flipped'); }

    function handleKnowledge(known) {
        if (!known) unknownCards.push(studyQueue[currentIndex]);
        currentIndex++;
        showCard();
    }

    function showResults() {
        document.getElementById('study-ui').classList.add('hidden');
        document.getElementById('result-ui').classList.remove('hidden');
        document.getElementById('result-summary').innerText = `Finished! You knew ${studyQueue.length - unknownCards.length} out of ${studyQueue.length} terms.`;
        document.getElementById('retry-unknown-btn').classList.toggle('hidden', unknownCards.length === 0);
    }

    function restartUnknown() {
        studyQueue = [...unknownCards];
        initSession();
    }

    window.addEventListener('keydown', (e) => {
        if (document.getElementById('study-ui').classList.contains('hidden')) return;
        if (e.code === 'Space') { e.preventDefault(); flipCard(); }
        if (e.code === 'ArrowLeft') handleKnowledge(false);
        if (e.code === 'ArrowRight') handleKnowledge(true);
    });
</script>
</body>
</html>
